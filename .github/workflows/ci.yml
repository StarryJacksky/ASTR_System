name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Soul purity (no weights in soul_package)
        run: uv run python scripts/check_soul_purity.py

      - name: License gate (no UNKNOWN deps; copyleft allowed in AGPL main repo)
        run: uv run python scripts/check_licenses.py

      - name: Pytest
        run: uv run pytest -q
